<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MosaVerse — Streetwear Mockup Design Gallery</title>
    <link rel="icon" type="image/jpeg" href="images/mosaverse-logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        epilogue: ['Epilogue', 'sans-serif'],
                        vietnam: ['Be Vietnam Pro', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-vietnam min-h-screen">

    <!-- Navigation -->
    <nav class="bg-black">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-2.5">
                    <img src="images/mosaverse-logo.jpg" alt="MosaVerse" class="w-8 h-8 rounded-lg object-cover">
                    <span class="font-epilogue text-xl font-bold tracking-tight text-white uppercase">MOSAVERSE</span>
                </a>
                <div class="flex items-center gap-8">
                    <a href="index.html" class="text-sm font-semibold text-white uppercase relative pb-1">
                        HOME
                        <span class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-purple-500"></span>
                    </a>
                    <a href="about.html" class="text-sm text-gray-400 uppercase hover:text-white transition-colors">
                        ABOUT
                    </a>
                    <a href="admin-login.html" class="text-sm text-gray-400 uppercase hover:text-white transition-colors">
                        ADMIN LOGIN
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- AI Search Bar -->
    <section class="max-w-7xl mx-auto px-6 lg:px-8 py-8">
        <div class="relative max-w-2xl">
            <div class="flex items-center bg-white rounded-xl border border-gray-200 shadow-sm focus-within:border-purple-500 focus-within:ring-2 focus-within:ring-purple-500/20 transition-all">
                <svg class="w-5 h-5 ml-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Search desain baju dengan AI..."
                    class="w-full px-4 py-3.5 bg-transparent text-sm text-black placeholder-gray-400 outline-none"
                >
                <button id="searchBtn" class="mr-2 px-4 py-2 bg-black text-white text-xs font-bold rounded-lg hover:bg-gray-800 transition-colors">
                    SEARCH
                </button>
            </div>
            <!-- Search loading indicator -->
            <div id="searchLoading" class="hidden mt-3 flex items-center gap-2 text-sm text-gray-500">
                <svg class="animate-spin h-4 w-4 text-purple-500" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
                <span>AI sedang mencari...</span>
            </div>
            <!-- Search results info -->
            <div id="searchInfo" class="hidden mt-3 flex items-center justify-between">
                <p class="text-sm text-gray-500">
                    Menampilkan <span id="searchCount">0</span> hasil untuk "<span id="searchQuery"></span>"
                </p>
                <button id="clearSearch" class="text-sm text-purple-600 font-semibold hover:underline">
                    Hapus pencarian
                </button>
            </div>
        </div>
    </section>

    <!-- Category Filter -->
    <section class="max-w-7xl mx-auto px-6 lg:px-8 pb-6">
        <div class="flex items-center gap-3 overflow-x-auto pb-2" id="categoryFilter">
            <button class="category-btn active px-4 py-1.5 text-xs font-bold uppercase tracking-wider rounded-full bg-black text-white transition-all" data-category="all">
                All
            </button>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="max-w-7xl mx-auto px-6 lg:px-8 pb-16">
        <!-- Loading state -->
        <div id="galleryLoading" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="animate-pulse bg-white rounded-xl overflow-hidden">
                <div class="aspect-square bg-gray-200"></div>
                <div class="p-4">
                    <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-1/2"></div>
                </div>
            </div>
            <div class="animate-pulse bg-white rounded-xl overflow-hidden">
                <div class="aspect-square bg-gray-200"></div>
                <div class="p-4">
                    <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-1/2"></div>
                </div>
            </div>
            <div class="animate-pulse bg-white rounded-xl overflow-hidden hidden sm:block">
                <div class="aspect-square bg-gray-200"></div>
                <div class="p-4">
                    <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-1/2"></div>
                </div>
            </div>
            <div class="animate-pulse bg-white rounded-xl overflow-hidden hidden md:block">
                <div class="aspect-square bg-gray-200"></div>
                <div class="p-4">
                    <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-1/2"></div>
                </div>
            </div>
        </div>

        <!-- Gallery content -->
        <div id="galleryGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Cards will be rendered by JavaScript -->
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden text-center py-20">
            <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <h3 class="font-epilogue text-lg font-semibold text-gray-500">Belum ada desain</h3>
            <p class="text-sm text-gray-400 mt-1">Desain akan muncul di sini setelah ditambahkan.</p>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="hidden flex items-center justify-center gap-2 mt-12">
        </div>
    </section>

    <!-- Footer -->
    <footer class="max-w-7xl mx-auto px-6 lg:px-8 py-8 text-center">
        <p class="text-xs text-gray-400">&copy; 2025 MosaVerse. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
