<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MosaVerse — Design Detail</title>
    <link rel="icon" type="image/jpeg" href="images/mosaverse-logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        epilogue: ['Epilogue', 'sans-serif'],
                        vietnam: ['Be Vietnam Pro', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-vietnam min-h-screen">

    <!-- Navigation -->
    <nav class="bg-black">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-2.5">
                    <img src="images/mosaverse-logo.jpg" alt="MosaVerse" class="w-8 h-8 rounded-lg object-cover">
                    <span class="font-epilogue text-xl font-bold tracking-tight text-white uppercase">MOSAVERSE</span>
                </a>
                <div class="flex items-center gap-8">
                    <a href="index.html" class="text-sm text-gray-400 uppercase hover:text-white transition-colors">HOME</a>
                    <a href="about.html" class="text-sm text-gray-400 uppercase hover:text-white transition-colors">ABOUT</a>
                    <a href="admin-login.html" class="text-sm text-gray-400 uppercase hover:text-white transition-colors">ADMIN LOGIN</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Loading State -->
    <div id="detailLoading" class="max-w-6xl mx-auto px-6 lg:px-8 py-12">
        <div class="animate-pulse grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="aspect-square bg-gray-200 rounded-2xl"></div>
            <div>
                <div class="h-8 bg-gray-200 rounded w-3/4 mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-1/3 mb-6"></div>
                <div class="h-24 bg-gray-200 rounded-xl mb-6"></div>
                <div class="h-10 bg-gray-200 rounded-xl w-48"></div>
            </div>
        </div>
    </div>

    <!-- Detail Content -->
    <main id="detailContent" class="hidden max-w-6xl mx-auto px-6 lg:px-8 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <!-- Image -->
            <div>
                <div class="aspect-square rounded-2xl overflow-hidden bg-gray-900 shadow-lg">
                    <img id="designImage" src="" alt="" class="w-full h-full object-cover">
                </div>
            </div>

            <!-- Info -->
            <div class="flex flex-col">
                <!-- Title -->
                <h1 id="designTitle" class="font-epilogue text-3xl md:text-4xl font-bold text-black leading-tight">
                    Design Title
                </h1>

                <!-- Upload date -->
                <p id="designDate" class="text-sm text-gray-500 mt-2">
                    Uploaded: -
                </p>

                <!-- Category badge -->
                <div id="designCategory" class="inline-flex items-center self-start mt-4 px-4 py-1.5 text-xs font-bold uppercase tracking-wider text-white bg-purple-600 rounded-full">
                    Category
                </div>

                <!-- Description Box -->
                <div class="mt-6 p-5 bg-white rounded-xl shadow-sm">
                    <p id="designDescription" class="text-sm text-black leading-relaxed">
                        Design description goes here.
                    </p>
                </div>

                <!-- Back button -->
                <a href="index.html" class="mt-8 inline-flex items-center gap-2 px-6 py-3 border-2 border-black rounded-xl text-sm font-semibold text-black hover:bg-black hover:text-white transition-colors w-fit">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Back to Gallery
                </a>
            </div>
        </div>
    </main>

    <!-- Error State -->
    <div id="errorState" class="hidden max-w-6xl mx-auto px-6 lg:px-8 py-20 text-center">
        <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
        <h3 class="font-epilogue text-lg font-semibold text-gray-500">Desain tidak ditemukan</h3>
        <p class="text-sm text-gray-400 mt-1">Desain yang kamu cari mungkin sudah dihapus.</p>
        <a href="index.html" class="inline-block mt-6 px-6 py-3 bg-black text-white text-sm font-semibold rounded-xl hover:bg-gray-800 transition-colors">
            Kembali ke Gallery
        </a>
    </div>

    <!-- Footer -->
    <footer class="max-w-7xl mx-auto px-6 lg:px-8 py-8 text-center">
        <p class="text-xs text-gray-400">&copy; 2026 MosaVerse. All rights reserved.</p>
    </footer>

    <script src="js/api.js?v=4"></script>
    <script src="js/detail.js?v=4"></script>
</body>
</html>
