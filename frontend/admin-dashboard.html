<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MosaVerse Admin — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#0F0F0F', secondary: '#1F1F1F', accent: '#FFFFFF', highlight: '#7C3AED', bg: '#F5F5F5' },
                fontFamily: { epilogue: ['Epilogue', 'sans-serif'], vietnam: ['Be Vietnam Pro', 'sans-serif'] },
                borderRadius: { 'card': '12px', 'btn': '10px', 'input': '10px' }
            }}
        }
    </script>
</head>
<body class="bg-bg font-vietnam text-primary min-h-screen">

    <!-- Admin Sidebar -->
    <aside id="adminSidebar" class="fixed inset-y-0 left-0 w-60 bg-primary text-accent z-50 flex flex-col">
        <div class="p-6">
            <a href="../index.html" class="font-epilogue text-lg font-bold tracking-tight text-accent">
                Mosa<span class="text-highlight">Verse</span>
            </a>
            <p class="text-[10px] text-accent/40 uppercase tracking-widest mt-1">Admin Panel</p>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-2.5 rounded-btn text-sm font-semibold bg-secondary text-accent">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                Dashboard
            </a>
            <a href="admin-designs.html" class="flex items-center gap-3 px-4 py-2.5 rounded-btn text-sm text-accent/60 hover:text-accent hover:bg-secondary/50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Designs
            </a>
        </nav>
        <div class="p-4 border-t border-accent/10">
            <button id="logoutBtn" class="flex items-center gap-3 w-full px-4 py-2.5 rounded-btn text-sm text-accent/60 hover:text-accent hover:bg-secondary/50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-60 min-h-screen">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-primary/5 sticky top-0 z-40">
            <div class="px-8 py-4 flex items-center justify-between">
                <h1 class="font-epilogue text-xl font-bold">Dashboard</h1>
                <div class="flex items-center gap-3">
                    <span id="adminName" class="text-sm text-primary/60">Admin</span>
                    <div class="w-8 h-8 bg-highlight/10 rounded-full flex items-center justify-center">
                        <svg class="w-4 h-4 text-highlight" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="p-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-card p-6 shadow-sm">
                    <p class="text-xs font-bold uppercase tracking-wider text-primary/40">Total Designs</p>
                    <p id="statTotalDesigns" class="font-epilogue text-3xl font-bold mt-2">-</p>
                </div>
                <div class="bg-white rounded-card p-6 shadow-sm">
                    <p class="text-xs font-bold uppercase tracking-wider text-primary/40">Categories</p>
                    <p id="statTotalCategories" class="font-epilogue text-3xl font-bold mt-2">-</p>
                </div>
                <div class="bg-white rounded-card p-6 shadow-sm">
                    <p class="text-xs font-bold uppercase tracking-wider text-primary/40">Featured</p>
                    <p id="statFeatured" class="font-epilogue text-3xl font-bold mt-2 text-highlight">-</p>
                </div>
                <div class="bg-white rounded-card p-6 shadow-sm">
                    <p class="text-xs font-bold uppercase tracking-wider text-primary/40">Published</p>
                    <p id="statPublished" class="font-epilogue text-3xl font-bold mt-2">-</p>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="flex items-center gap-4 mb-8">
                <a href="admin-design-form.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-primary text-accent text-sm font-semibold rounded-btn hover:bg-highlight transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Add New Design
                </a>
                <a href="admin-designs.html" class="inline-flex items-center gap-2 px-5 py-2.5 border border-primary/10 text-sm font-semibold rounded-btn hover:bg-primary/5 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                    Manage Designs
                </a>
            </div>

            <!-- Recent Designs -->
            <div class="bg-white rounded-card shadow-sm">
                <div class="px-6 py-4 border-b border-primary/5 flex items-center justify-between">
                    <h2 class="font-epilogue text-sm font-bold">Recent Designs</h2>
                    <a href="admin-designs.html" class="text-xs text-highlight font-semibold hover:underline">View All</a>
                </div>
                <div id="recentDesigns" class="divide-y divide-primary/5">
                    <div class="px-6 py-8 text-center text-sm text-primary/40">Loading...</div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/admin-api.js"></script>
    <script src="js/admin-dashboard.js"></script>
</body>
</html>
