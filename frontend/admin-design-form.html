<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MosaVerse Admin — Design Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#0F0F0F', secondary: '#1F1F1F', accent: '#FFFFFF', highlight: '#7C3AED', bg: '#F5F5F5' },
                fontFamily: { epilogue: ['Epilogue', 'sans-serif'], vietnam: ['Be Vietnam Pro', 'sans-serif'] },
                borderRadius: { 'card': '12px', 'btn': '10px', 'input': '10px' }
            }}
        }
    </script>
</head>
<body class="bg-bg font-vietnam text-primary min-h-screen">

    <!-- Admin Sidebar -->
    <aside class="fixed inset-y-0 left-0 w-60 bg-primary text-accent z-50 flex flex-col">
        <div class="p-6">
            <a href="../index.html" class="font-epilogue text-lg font-bold tracking-tight text-accent">Mosa<span class="text-highlight">Verse</span></a>
            <p class="text-[10px] text-accent/40 uppercase tracking-widest mt-1">Admin Panel</p>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="admin-dashboard.html" class="flex items-center gap-3 px-4 py-2.5 rounded-btn text-sm text-accent/60 hover:text-accent hover:bg-secondary/50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                Dashboard
            </a>
            <a href="admin-designs.html" class="flex items-center gap-3 px-4 py-2.5 rounded-btn text-sm font-semibold bg-secondary text-accent">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Designs
            </a>
        </nav>
        <div class="p-4 border-t border-accent/10">
            <button id="logoutBtn" class="flex items-center gap-3 w-full px-4 py-2.5 rounded-btn text-sm text-accent/60 hover:text-accent hover:bg-secondary/50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="ml-60 min-h-screen">
        <header class="bg-white/80 backdrop-blur-md border-b border-primary/5 sticky top-0 z-40">
            <div class="px-8 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="admin-designs.html" class="text-primary/40 hover:text-primary transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    </a>
                    <h1 id="formTitle" class="font-epilogue text-xl font-bold">Add New Design</h1>
                </div>
            </div>
        </header>

        <div class="p-8 max-w-3xl">
            <form id="designForm" class="space-y-6">
                <input type="hidden" id="designId" value="">

                <!-- Title -->
                <div class="bg-white rounded-card shadow-sm p-6">
                    <label for="title" class="block text-xs font-bold uppercase tracking-wider text-primary/50 mb-2">Title *</label>
                    <input type="text" id="title" name="title" required
                        class="w-full px-4 py-3 bg-bg border border-primary/10 rounded-input text-sm text-primary placeholder-primary/30 outline-none focus:border-highlight focus:ring-2 focus:ring-highlight/20 transition-all"
                        placeholder="Enter design title">
                </div>

                <!-- Image Upload -->
                <div class="bg-white rounded-card shadow-sm p-6">
                    <label class="block text-xs font-bold uppercase tracking-wider text-primary/50 mb-2">Image *</label>
                    <div id="imageUploadArea" class="border-2 border-dashed border-primary/10 rounded-card p-8 text-center cursor-pointer hover:border-highlight/50 transition-colors">
                        <div id="imagePreview" class="hidden mb-4">
                            <img id="previewImg" src="" alt="Preview" class="max-h-48 mx-auto rounded-btn">
                        </div>
                        <div id="uploadPlaceholder">
                            <svg class="w-10 h-10 mx-auto text-primary/20 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <p class="text-sm text-primary/50">Click to upload or drag image here</p>
                            <p class="text-xs text-primary/30 mt-1">PNG, JPG up to 10MB</p>
                        </div>
                        <input type="file" id="imageInput" name="image" accept="image/*" class="hidden">
                    </div>
                </div>

                <!-- Category -->
                <div class="bg-white rounded-card shadow-sm p-6">
                    <div class="flex items-center justify-between mb-2">
                        <label for="category" class="block text-xs font-bold uppercase tracking-wider text-primary/50">Category</label>
                        <button type="button" id="generateCategoryBtn" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-highlight/10 text-highlight text-xs font-semibold rounded-btn hover:bg-highlight/20 transition-colors">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            AI Auto-Category
                        </button>
                    </div>
                    <select id="category" name="category"
                        class="w-full px-4 py-3 bg-bg border border-primary/10 rounded-input text-sm text-primary outline-none focus:border-highlight focus:ring-2 focus:ring-highlight/20 transition-all">
                        <option value="">Select a category</option>
                    </select>
                    <div id="categoryLoading" class="hidden mt-2 text-xs text-primary/40 flex items-center gap-2">
                        <svg class="animate-spin h-3 w-3 text-highlight" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                        AI sedang menentukan kategori...
                    </div>
                </div>

                <!-- Description -->
                <div class="bg-white rounded-card shadow-sm p-6">
                    <div class="flex items-center justify-between mb-2">
                        <label for="description" class="block text-xs font-bold uppercase tracking-wider text-primary/50">Description</label>
                        <button type="button" id="generateDescBtn" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-highlight/10 text-highlight text-xs font-semibold rounded-btn hover:bg-highlight/20 transition-colors">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            AI Generate
                        </button>
                    </div>
                    <textarea id="description" name="description" rows="4"
                        class="w-full px-4 py-3 bg-bg border border-primary/10 rounded-input text-sm text-primary placeholder-primary/30 outline-none focus:border-highlight focus:ring-2 focus:ring-highlight/20 transition-all resize-none"
                        placeholder="Describe this design..."></textarea>
                    <div id="descLoading" class="hidden mt-2 text-xs text-primary/40 flex items-center gap-2">
                        <svg class="animate-spin h-3 w-3 text-highlight" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                        AI sedang membuat deskripsi...
                    </div>
                </div>

                <!-- Status -->
                <div class="bg-white rounded-card shadow-sm p-6">
                    <div class="flex items-center gap-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="isFeatured" class="w-4 h-4 rounded border-primary/20 text-highlight focus:ring-highlight/20">
                            <span class="text-sm">Featured</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="isPublished" checked class="w-4 h-4 rounded border-primary/20 text-highlight focus:ring-highlight/20">
                            <span class="text-sm">Published</span>
                        </label>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-4">
                    <button type="submit" id="saveBtn" class="px-8 py-3 bg-primary text-accent text-sm font-semibold rounded-btn hover:bg-highlight transition-colors disabled:opacity-50">
                        Save Design
                    </button>
                    <a href="admin-designs.html" class="px-6 py-3 border border-primary/10 text-sm font-semibold rounded-btn hover:bg-primary/5 transition-colors">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 z-[110] px-5 py-3 rounded-btn text-sm font-semibold shadow-lg"></div>

    <script src="js/api.js"></script>
    <script src="js/admin-api.js"></script>
    <script src="js/admin-design-form.js"></script>
</body>
</html>
